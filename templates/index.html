{% extends "base.html" %}

{% block body %}
  <h1>Tareas</h1>

  <form class="agregar" action="{{ url_for('agregar') }}" method="post">
    <input
      type="text"
      id="texto_tarea"
      name="texto_tarea"
      placeholder="Escribe una tarea…"
      autocomplete="off"
      required
      aria-label="Nueva tarea"
    >
    <button type="submit">Añadir</button>
  </form>

  {% if tareas %}
    <ul class="tareas">
      {% for tarea in tareas %}
        <li class="{% if tarea.completada %}completada{% endif %}">
          <span class="texto">{{ tarea.texto }}</span>
          <div class="acciones">
            <a href="{{ url_for('editar', id=tarea.id) }}">Editar</a>
            <form action="{{ url_for('borrar', id=tarea.id) }}" method="post">
              <button type="submit" class="borrar" aria-label="Borrar tarea">Borrar</button>
            </form>
            {% if not tarea.completada %}
              <a class="completar" href="{{ url_for('completar', id=tarea.id) }}">Completar</a>
            {% endif %}
          </div>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="vacio">No hay tareas todavía.</p>
  {% endif %}
{% endblock %}
